<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Disclaimer Area Resizer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fff;
    color: #000;
    padding: 34px 29px 41px;
    display: flex;
    flex-direction: column;
    width: 420px;
  }

  /* ── Monitor ─────────────────────────────────────── */
  .monitor {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 35px;
  }

  .metric-label {
    font-size: 14px;
    font-weight: 400;
    line-height: 18px;
    color: #000;
  }

  .metric-value {
    font-size: 56px;
    font-weight: 900;
    line-height: 60px;
    color: #000;
    word-break: break-word;
  }

  .metric-value.green  { color: #00a941; }
  .metric-value.muted  { color: rgba(0, 0, 0, 0.2); }

  /* ── Controls ────────────────────────────────────── */
  .field-label {
    display: block;
    font-size: 14px;
    font-weight: 400;
    line-height: 18px;
    color: #000;
    margin-bottom: 11px;
  }

  .field-label.secondary {
    color: rgba(0, 0, 0, 0.5);
    margin-top: 16px;
  }

  .select-wrapper {
    position: relative;
  }

  select,
  .custom-input {
    width: 100%;
    padding: 19px;
    border: 1px solid rgba(0, 0, 0, 0.3);
    border-radius: 20px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 500;
    line-height: 22px;
    color: #000;
    background: #fff;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }

  select {
    padding-right: 52px;
    cursor: pointer;
  }

  select:focus,
  .custom-input:focus {
    border-color: rgba(0, 0, 0, 0.6);
  }

  .select-arrow {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    line-height: 0;
  }

  .custom-block {
    margin-top: 12px;
  }

  /* ── Button ──────────────────────────────────────── */
  .btn-area {
    margin-top: 94px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  #applyBtn {
    display: block;
    width: 100%;
    padding: 20px;
    background: #0d99ff;
    color: #fff;
    border: none;
    border-radius: 20px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 500;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    transition: background 0.12s;
  }

  #applyBtn:hover:not(:disabled) { background: #0088e8; }
  #applyBtn:active:not(:disabled) { background: #006ec4; }

  #applyBtn:disabled {
    background: rgba(13, 153, 255, 0.35);
    cursor: not-allowed;
  }

  /* ── Feedback ────────────────────────────────────── */
  .feedback {
    font-size: 14px;
    font-weight: 400;
    line-height: 18px;
    margin-top: 14px;
  }

  .feedback.error   { color: #d0021b; }
  .feedback.success { color: #00a941; }
</style>
</head>
<body>

<!-- Info -->
<div class="monitor">
  <div>
    <div class="metric-label">Баннер</div>
    <div class="metric-value muted" id="bannerVal">—</div>
  </div>
  <div>
    <div class="metric-label">Дисклеймер</div>
    <div class="metric-value muted" id="disclaimerVal">—</div>
  </div>
  <div>
    <div class="metric-label">Текущий процент</div>
    <div class="metric-value green muted" id="percentVal">—</div>
  </div>
</div>

<!-- Controls -->
<div>
  <label class="field-label" for="presetSelect">Тип дисклеймера</label>
  <div class="select-wrapper">
    <select id="presetSelect"></select>
    <div class="select-arrow">
      <svg width="14" height="9" viewBox="0 0 14 9" fill="none">
        <path d="M1 1L7 7L13 1" stroke="#000" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <div id="customBlock" class="custom-block" style="display:none">
    <label class="field-label secondary" for="customInput">Процент (%)</label>
    <input type="number" id="customInput" class="custom-input"
           min="0.01" max="100" step="0.01" placeholder="например, 7.5" />
  </div>
</div>

<!-- Button + feedback -->
<div class="btn-area">
  <button id="applyBtn" disabled>Применить</button>
  <div id="feedback" class="feedback" style="display:none"></div>
</div>

<script>
(function () {
  var WINDOW_W   = 420;
  var HEIGHT_BASE = 630;
  var HEIGHT_CUSTOM = 730;

  var state   = null;
  var presets = {};

  var bannerVal    = document.getElementById('bannerVal');
  var disclaimerVal= document.getElementById('disclaimerVal');
  var percentVal   = document.getElementById('percentVal');
  var presetSelect = document.getElementById('presetSelect');
  var customBlock  = document.getElementById('customBlock');
  var customInput  = document.getElementById('customInput');
  var applyBtn     = document.getElementById('applyBtn');
  var feedbackEl   = document.getElementById('feedback');

  /* ── Presets ── */
  function populatePresets(data) {
    presets = data;
    presetSelect.innerHTML = '';
    Object.keys(data).forEach(function (key) {
      var opt = document.createElement('option');
      opt.value = key;
      opt.textContent = data[key].label;
      presetSelect.appendChild(opt);
    });
    syncCustomBlock();
  }

  function syncCustomBlock() {
    var isCustom = presetSelect.value === 'custom';
    customBlock.style.display = isCustom ? '' : 'none';
    if (!isCustom) customInput.value = '';
    sendResize(isCustom ? HEIGHT_CUSTOM : HEIGHT_BASE);
  }

  function sendResize(h) {
    parent.postMessage({ pluginMessage: { type: 'resize', width: WINDOW_W, height: h } }, '*');
  }

  /* ── Metrics ── */
  function setMetric(el, text, empty) {
    el.textContent = text;
    empty ? el.classList.add('muted') : el.classList.remove('muted');
  }

  /* ── Feedback ── */
  function showFeedback(type, text) {
    feedbackEl.className = 'feedback ' + type;
    feedbackEl.textContent = text;
    feedbackEl.style.display = '';
  }

  function hideFeedback() {
    feedbackEl.style.display = 'none';
  }

  /* ── Render state ── */
  function renderState(msg) {
    state = msg;

    if (msg.presets && Object.keys(presets).length === 0) {
      populatePresets(msg.presets);
    }

    if (msg.type === 'no-selection') {
      setMetric(bannerVal, '—', true);
      setMetric(disclaimerVal, '—', true);
      setMetric(percentVal, '—', true);
      applyBtn.disabled = true;
      hideFeedback();
      return;
    }

    if (msg.type === 'invalid') {
      setMetric(bannerVal, '—', true);
      setMetric(disclaimerVal, '—', true);
      setMetric(percentVal, '—', true);
      applyBtn.disabled = true;
      showFeedback('error', msg.error || 'Неверный выбор');
      return;
    }

    var i = msg.info;
    setMetric(bannerVal,     i.bannerWidth     + ' × ' + i.bannerHeight,     false);
    setMetric(disclaimerVal, i.disclaimerWidth + ' × ' + i.disclaimerHeight, false);
    setMetric(percentVal,    i.currentPercent  + '%',                        false);
    applyBtn.disabled = false;
    hideFeedback();
  }

  /* ── Events ── */
  presetSelect.addEventListener('change', function () {
    syncCustomBlock();
    hideFeedback();
  });

  customInput.addEventListener('input', hideFeedback);

  applyBtn.addEventListener('click', function () {
    if (!state || state.type !== 'ready') return;

    var key = presetSelect.value;
    var customPct = null;

    if (key === 'custom') {
      var v = parseFloat(customInput.value);
      if (isNaN(v) || v <= 0 || v > 100) {
        showFeedback('error', 'Укажите корректный процент (0–100)');
        return;
      }
      customPct = v;
    }

    applyBtn.disabled = true;
    applyBtn.textContent = 'Применяю…';
    hideFeedback();

    parent.postMessage({ pluginMessage: {
      type:          'apply-resize',
      presetKey:     key,
      customPercent: customPct,
      direction:     'height',
      onlyEnlarge:   false
    }}, '*');
  });

  /* ── Messages from plugin ── */
  window.onmessage = function (evt) {
    var msg = evt.data && evt.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'no-selection' || msg.type === 'invalid' || msg.type === 'ready') {
      applyBtn.textContent = 'Применить';
      if (msg.type === 'ready') applyBtn.disabled = false;
      renderState(msg);
      return;
    }
    if (msg.type === 'success') {
      applyBtn.textContent = 'Применить';
      applyBtn.disabled = false;
      showFeedback('success', msg.message);
      return;
    }
    if (msg.type === 'error') {
      applyBtn.textContent = 'Применить';
      applyBtn.disabled = false;
      showFeedback('error', msg.message);
      return;
    }
  };

  parent.postMessage({ pluginMessage: { type: 'request-state' } }, '*');
}());
</script>
</body>
</html>

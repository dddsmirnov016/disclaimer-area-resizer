        <select id="presetSelect"></select>

        <div class="select-menu-wrapper">
          <div id="presetTrigger" class="select-trigger" role="combobox"
               aria-haspopup="listbox" aria-expanded="false" aria-controls="presetMenu"
               tabindex="0">
            <span id="presetTriggerText" class="select-trigger-text"></span>
            <span class="select-trigger-icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M5 7.5L10 12.5L15 7.5" stroke="#667085" stroke-width="1.67"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>
          <div id="presetMenu" class="select-menu" role="listbox"></div>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="addToImageInput" />
          <label for="addToImageInput" data-copy="labels.addToImage"></label>
        </div>
        <div class="checkbox-row">

          <label for="createAllInput" data-copy="labels.createAll"></label>
        </div>
      </div>

      <div class="metric-card" id="disclaimerSizeCard">

          <span data-part="w">—</span>
          <span>×</span>
          <span data-part="h">—</span>
        </div>
      </div>
      <div class="metric-card" id="percentCard">
        <div class="metric-card-label" data-copy="labels.currentPercent"></div>

      <div id="successMsg" class="success-box"></div>

<script>
(function () {
  var WINDOW_W = 384;
  var WINDOW_H = 776;
  var UI = window.UI_COPY.ui;

  var state = null;
  var presets = {};
  var keepFeedbackOnNextReady = false;
  var lastDetectionIdentity = null;

  var presetSelect    = document.getElementById('presetSelect');
  var presetTrigger   = document.getElementById('presetTrigger');
  var presetTriggerText = document.getElementById('presetTriggerText');
  var presetMenu      = document.getElementById('presetMenu');
  var addToImageInput = document.getElementById('addToImageInput');
  var createAllInput  = document.getElementById('createAllInput');
  var applyBtn        = document.getElementById('applyBtn');
  var errorBox        = document.getElementById('errorBox');
  var successMsg      = document.getElementById('successMsg');
  var infoMsg         = document.getElementById('infoMsg');
  var disclaimerVal   = document.getElementById('disclaimerVal');
  var percentVal      = document.getElementById('percentVal');
  var metricsBlock    = document.getElementById('metricsBlock');

  function getUiCopy(path) {
    return path.split('.').reduce(function (acc, key) {
      return acc && acc[key];
    }, UI);
  }

  function applyStaticCopy() {
    document.title = UI.title;
    presetSelect.setAttribute('aria-label', UI.labels.presetAria);
    document.querySelectorAll('[data-copy]').forEach(function (el) {
      el.textContent = getUiCopy(el.getAttribute('data-copy'));
    });
  }

  applyStaticCopy();

  // ── Helpers ─────────────────────────────────────────────────────────

  function formatRuNumber(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    var rounded = Math.round(n * 100) / 100;
    var intPart = Math.floor(Math.abs(rounded));
    var dec = Math.round((Math.abs(rounded) - intPart) * 100);
    var intStr = String(intPart);
    if (intStr.length > 3) {
      intStr = intStr.replace(/\B(?=(\d{3})+(?!\d))/g, '\u00a0');
    }
    if (dec === 0) return (rounded < 0 ? '\u2212' : '') + intStr;
    var decStr = String(dec);
    if (decStr.length === 1) decStr = decStr + '0';
    if (decStr.endsWith('0')) decStr = decStr.slice(0, -1);
    return (rounded < 0 ? '\u2212' : '') + intStr + ',' + decStr;
  }

  function formatRuPercent(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    return formatRuNumber(n) + '\u00a0%';
  }

  function setSizeMetric(el, w, h, empty) {
    var wEl = el.querySelector('[data-part="w"]');
    var hEl = el.querySelector('[data-part="h"]');
    if (empty) {
      wEl.textContent = '—';
      hEl.textContent = '—';
      el.classList.add('muted');
    } else {
      wEl.textContent = formatRuNumber(w);
      hEl.textContent = formatRuNumber(h);
      el.classList.remove('muted');
    }
  }

  // ── Custom dropdown ──────────────────────────────────────────────────

  function buildMenu(data) {
    presets = data;
    presetSelect.innerHTML = '';
    presetMenu.innerHTML = '';

    Object.keys(data).forEach(function (key) {
      var opt = document.createElement('option');
      opt.value = key;
      opt.textContent = data[key].label;
      presetSelect.appendChild(opt);

      var item = document.createElement('div');
      item.className = 'select-menu-item';
      item.setAttribute('role', 'option');
      item.setAttribute('data-value', key);

      var text = document.createElement('span');
      text.className = 'select-menu-item-text';
      text.textContent = data[key].label;

      var check = document.createElement('span');
      check.className = 'select-menu-item-check';
      check.setAttribute('aria-hidden', 'true');
      check.innerHTML = '<svg width="20" height="20" viewBox="0 0 20 20" fill="none">' +
        '<path d="M5 10.5L8.5 14L15 7" stroke="#7F56D9" stroke-width="2" ' +
        'stroke-linecap="round" stroke-linejoin="round"/></svg>';

      item.appendChild(text);
      item.appendChild(check);

      item.addEventListener('click', function () {
        selectValue(key);
        closeMenu();
      });

      presetMenu.appendChild(item);
    });

    syncMenuSelection();
    syncTriggerText();
  }

  function syncMenuSelection() {
    var current = presetSelect.value;
    var items = presetMenu.querySelectorAll('.select-menu-item');
    items.forEach(function (item) {
      if (item.getAttribute('data-value') === current) {
        item.classList.add('selected');
        item.setAttribute('aria-selected', 'true');
      } else {
        item.classList.remove('selected');
        item.setAttribute('aria-selected', 'false');
      }
    });
  }

  function syncTriggerText() {
    var key = presetSelect.value;
    presetTriggerText.textContent = (presets[key] && presets[key].label) || '';
  }

  function selectValue(key) {
    if (!presets[key]) return;
    presetSelect.value = key;
    syncMenuSelection();
    syncTriggerText();
    presetSelect.dispatchEvent(new Event('change'));
  }

  function openMenu() {
    presetMenu.classList.add('open');
    presetTrigger.classList.add('open');
    presetTrigger.setAttribute('aria-expanded', 'true');
  }

  function closeMenu() {
    presetMenu.classList.remove('open');
    presetTrigger.classList.remove('open');
    presetTrigger.setAttribute('aria-expanded', 'false');
  }

  function toggleMenu() {
    if (presetMenu.classList.contains('open')) {
      closeMenu();
    } else {
      openMenu();
    }
  }

  presetTrigger.addEventListener('click', function (e) {
    e.stopPropagation();
    toggleMenu();
  });

  presetTrigger.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleMenu();
    } else if (e.key === 'Escape') {
      closeMenu();
    }
  });

  document.addEventListener('click', function () {
    closeMenu();
  });

  // ── State rendering ──────────────────────────────────────────────────

  function getTargetPercent() {
    var key = presetSelect.value;
    if (!key || !presets[key]) return null;
    return presets[key].percent;
  }

  function updatePercentColor() {
    percentVal.classList.remove('green', 'red');
    if (!state || state.type !== 'ready') return;
    if (state.info.currentPercent === null || state.info.currentPercent === undefined) {
      percentVal.classList.add('green');
      return;
    }
    var target = getTargetPercent();
    if (target === null) {
      percentVal.classList.add('green');
      return;
    }
    if (state.info.currentPercent < target) {
      percentVal.classList.add('red');
    } else {
      percentVal.classList.add('green');
    }
  }

  function getIdleButtonLabel() {
    if (state && state.type === 'ready' && state.info && state.info.mode === 'add-missing') {
      return createAllInput.checked ? UI.buttons.create : UI.buttons.add;
    }
    return UI.buttons.apply;
  }

  function detectionIdentity(i) {
    return [i.mode, i.bannerName, i.disclaimerName, i.disclaimerWidth, i.disclaimerHeight].join('|');
  }

  function applyDetectedPreset(i) {
    var identity = detectionIdentity(i);
    var isNewDetection = identity !== lastDetectionIdentity;
    lastDetectionIdentity = identity;
    if (!isNewDetection) return;
    if (!i.detectedPresetKey || !presets[i.detectedPresetKey]) return;
    if (presetSelect.value === i.detectedPresetKey) return;
    presetSelect.value = i.detectedPresetKey;
    syncMenuSelection();
    syncTriggerText();
  }

  function syncAddTargetAvailability() {
    var canAdd = state && state.type === 'ready' && state.info && state.info.mode === 'add-missing';
    addToImageInput.disabled = !canAdd;
    createAllInput.disabled = !canAdd;
    if (!canAdd) addToImageInput.checked = false;
    if (!canAdd) createAllInput.checked = false;
  }

  function setMetricsEmpty(empty) {
    var cards = metricsBlock.querySelectorAll('.metric-card');
    cards.forEach(function (c) {
      c.style.display = empty ? 'none' : '';
    });
  }

  function showError(text) {
    errorBox.textContent = text;
    errorBox.classList.add('visible');
    successMsg.classList.remove('visible');
    infoMsg.classList.remove('visible');
  }

  function hideError() {
    errorBox.classList.remove('visible');
    errorBox.textContent = '';
  }

  function showSuccess(text) {
    successMsg.textContent = text;
    successMsg.classList.add('visible');
    errorBox.classList.remove('visible');
    infoMsg.classList.remove('visible');
  }

  function hideSuccess() {
    successMsg.classList.remove('visible');
    successMsg.textContent = '';
  }

  function showInfo(text) {
    infoMsg.textContent = text;
    infoMsg.classList.add('visible');
    errorBox.classList.remove('visible');
    successMsg.classList.remove('visible');
  }

  function hideInfo() {
    infoMsg.classList.remove('visible');
    infoMsg.textContent = '';
  }

  function hideFeedback() {
    hideError();
    hideSuccess();
    hideInfo();
  }

  function renderState(msg) {
    state = msg;

    if (msg.presets && Object.keys(presets).length === 0) {
      buildMenu(msg.presets);
    }

    if (msg.type === 'no-selection') {
      setMetricsEmpty(true);
      setSizeMetric(disclaimerVal, null, null, true);
      percentVal.textContent = '—';
      percentVal.classList.add('muted');
      percentVal.classList.remove('green', 'red');
      applyBtn.disabled = true;
      applyBtn.textContent = UI.buttons.apply;
      syncAddTargetAvailability();
      hideFeedback();
      return;
    }

    if (msg.type === 'invalid') {
      setMetricsEmpty(true);
      setSizeMetric(disclaimerVal, null, null, true);
      percentVal.textContent = '—';
      percentVal.classList.add('muted');
      percentVal.classList.remove('green', 'red');
      applyBtn.disabled = true;
      applyBtn.textContent = UI.buttons.apply;
      syncAddTargetAvailability();
      if (msg.feedbackTone === 'info') {
        showInfo(msg.error || UI.fallbacks.disclaimerNotFound);
      } else {
        showError(msg.error || UI.fallbacks.selectLayer);
      }
      return;
    }

    var i = msg.info;
    applyDetectedPreset(i);
    setMetricsEmpty(false);
    setSizeMetric(disclaimerVal, i.disclaimerWidth, i.disclaimerHeight, i.disclaimerWidth === null);
    percentVal.textContent = i.currentPercent === null ? '—' : formatRuPercent(i.currentPercent);
    if (i.currentPercent === null) {
      percentVal.classList.add('muted');
    } else {
      percentVal.classList.remove('muted');
    }
    updatePercentColor();
    applyBtn.disabled = false;
    applyBtn.textContent = getIdleButtonLabel();
    syncAddTargetAvailability();
    if (keepFeedbackOnNextReady) {
      keepFeedbackOnNextReady = false;
    } else {
      hideFeedback();
    }
  }

  // ── Event listeners ─────────────────────────────────────────────────

  presetSelect.addEventListener('change', function () {
    syncMenuSelection();
    syncTriggerText();
    updatePercentColor();
    hideFeedback();
  });

  createAllInput.addEventListener('change', function () {
    applyBtn.textContent = getIdleButtonLabel();
    hideFeedback();
  });

  applyBtn.addEventListener('click', function () {
    if (!state || state.type !== 'ready') return;
    var key = presetSelect.value;

    applyBtn.disabled = true;
    applyBtn.textContent = UI.buttons.applying;
    hideFeedback();

    parent.postMessage({ pluginMessage: {
      type: 'apply-resize',
      presetKey: key,
      customPercent: null,
      direction: 'height',
      onlyEnlarge: false,
      addTarget: addToImageInput.checked ? 'image' : 'body',
      createAll: createAllInput.checked,
      expectedNodeId: state.selectionId || null
    }}, '*');
  });

  // ── Plugin message handler ───────────────────────────────────────────

  window.onmessage = function (evt) {
    var msg = evt.data && evt.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'no-selection' || msg.type === 'invalid' || msg.type === 'ready') {
      if (msg.type === 'ready') applyBtn.disabled = false;
      renderState(msg);
      return;
    }
    if (msg.type === 'success') {
      applyBtn.textContent = getIdleButtonLabel();
      applyBtn.disabled = false;
      keepFeedbackOnNextReady = true;
      showSuccess(msg.message);
      return;
    }
    if (msg.type === 'error') {
      applyBtn.textContent = getIdleButtonLabel();
      applyBtn.disabled = false;
      keepFeedbackOnNextReady = false;
      showError(msg.message);
      return;
    }
  };

  parent.postMessage({ pluginMessage: { type: 'request-state' } }, '*');
  parent.postMessage({ pluginMessage: { type: 'resize', width: WINDOW_W, height: WINDOW_H } }, '*');
}());
</script>

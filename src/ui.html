<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Disclaimer Area Resizer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fff;
    color: #000;
    width: 432px;
    padding: 24px 32px 32px;
    display: flex;
    flex-direction: column;
  }

  .main {
    display: flex;
    flex-direction: column;
    gap: 48px;
    width: 368px;
  }

  .content-top {
    display: flex;
    flex-direction: column;
    gap: 32px;
    width: 100%;
  }

  /* ── Monitor ─────────────────────────────────────── */
  .monitor {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
  }

  .metric-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .metric-label {
    font-size: 14px;
    font-weight: 400;
    line-height: 24px;
    color: #000;
    width: 100%;
  }

  .metric-size {
    display: flex;
    align-items: baseline;
    gap: 4px;
    white-space: nowrap;
  }

  .size-num {
    font-size: 56px;
    font-weight: 900;
    line-height: 56px;
    color: #000;
  }

  .size-x {
    font-size: 40px;
    font-weight: 900;
    line-height: 44px;
    color: #000;
  }

  .metric-size.muted .size-num,
  .metric-size.muted .size-x {
    color: rgba(0, 0, 0, 0.2);
  }

  .metric-value {
    font-size: 56px;
    font-weight: 900;
    line-height: 56px;
    color: #000;
  }

  .metric-value.green { color: #00a941; }
  .metric-value.red   { color: #ff0000; }
  .metric-value.muted { color: rgba(0, 0, 0, 0.2); }

  /* ── Select ──────────────────────────────────────── */
  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

  .field-label {
    font-size: 14px;
    font-weight: 400;
    line-height: 16px;
    color: #000;
  }

  .field-label.secondary {
    line-height: 24px;
    color: rgba(0, 0, 0, 0.5);
  }

  .select-wrapper {
    position: relative;
    width: 100%;
  }

  select,
  .custom-input {
    width: 100%;
    padding: 16px;
    padding-right: 48px;
    border: 1px solid rgba(0, 0, 0, 0.3);
    border-radius: 20px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 500;
    line-height: 24px;
    color: #000;
    background: #fff;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }

  .custom-input {
    padding-right: 16px;
  }

  select {
    cursor: pointer;
  }

  select:focus,
  .custom-input:focus {
    border-color: rgba(0, 0, 0, 0.6);
  }

  .select-arrow {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 0;
  }

  .custom-block {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

  /* ── Actions ─────────────────────────────────────── */
  .actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

  .error-box {
    display: none;
    padding: 16px;
    border-radius: 20px;
    background: rgba(255, 0, 0, 0.1);
    font-size: 18px;
    font-weight: 400;
    line-height: 24px;
    color: #ff0000;
    word-break: break-word;
    width: 100%;
  }

  .error-box.visible {
    display: block;
  }

  #applyBtn {
    display: block;
    width: 100%;
    padding: 17px 20px;
    background: #0d99ff;
    color: #fff;
    border: none;
    border-radius: 20px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 500;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    transition: background 0.12s;
  }

  #applyBtn:hover:not(:disabled) { background: #0088e8; }
  #applyBtn:active:not(:disabled) { background: #006ec4; }

  #applyBtn:disabled {
    background: rgba(13, 153, 255, 0.35);
    cursor: not-allowed;
  }

  .feedback-success {
    font-size: 18px;
    font-weight: 400;
    line-height: 24px;
    color: #00a941;
    word-break: break-word;
  }
</style>
</head>
<body>

<div class="main">
  <div class="content-top">
    <div class="monitor">
      <div class="metric-block">
        <div class="metric-label">Баннер</div>
        <div class="metric-size muted" id="bannerVal">
          <span class="size-num" data-part="w">—</span>
          <span class="size-x">×</span>
          <span class="size-num" data-part="h">—</span>
        </div>
      </div>
      <div class="metric-block">
        <div class="metric-label">Дисклеймер</div>
        <div class="metric-size muted" id="disclaimerVal">
          <span class="size-num" data-part="w">—</span>
          <span class="size-x">×</span>
          <span class="size-num" data-part="h">—</span>
        </div>
      </div>
      <div class="metric-block">
        <div class="metric-label">Текущий процент</div>
        <div class="metric-value green muted" id="percentVal">—</div>
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="presetSelect">Тип дисклеймера</label>
      <div class="select-wrapper">
        <select id="presetSelect"></select>
        <div class="select-arrow">
          <svg width="14" height="9" viewBox="0 0 14 9" fill="none">
            <path d="M1 1L7 7L13 1" stroke="#000" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div id="customBlock" class="custom-block" style="display:none">
        <label class="field-label secondary" for="customInput">Процент (%)</label>
        <input type="number" id="customInput" class="custom-input"
               min="0.01" max="100" step="0.01" placeholder="например, 7,5" />
      </div>
    </div>
  </div>

  <div class="actions">
    <div id="errorBox" class="error-box"></div>
    <button id="applyBtn" disabled>Применить</button>
    <div id="successMsg" class="feedback-success" style="display:none"></div>
  </div>
</div>

<script>
(function () {
  var WINDOW_W = 432;
  var HEIGHT_BASE = 632;
  var HEIGHT_CUSTOM = 712;
  var HEIGHT_ERROR = 632;

  var state = null;
  var presets = {};

  var bannerVal = document.getElementById('bannerVal');
  var disclaimerVal = document.getElementById('disclaimerVal');
  var percentVal = document.getElementById('percentVal');
  var presetSelect = document.getElementById('presetSelect');
  var customBlock = document.getElementById('customBlock');
  var customInput = document.getElementById('customInput');
  var applyBtn = document.getElementById('applyBtn');
  var errorBox = document.getElementById('errorBox');
  var successMsg = document.getElementById('successMsg');

  function formatRuNumber(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    var rounded = Math.round(n * 100) / 100;
    var intPart = Math.floor(Math.abs(rounded));
    var dec = Math.round((Math.abs(rounded) - intPart) * 100);

    var intStr = String(intPart);
    if (intStr.length > 3) {
      intStr = intStr.replace(/\B(?=(\d{3})+(?!\d))/g, '\u00a0');
    }

    if (dec === 0) return (rounded < 0 ? '−' : '') + intStr;

    var decStr = String(dec);
    if (decStr.length === 1) decStr = decStr + '0';
    if (decStr.endsWith('0')) decStr = decStr.slice(0, -1);

    return (rounded < 0 ? '−' : '') + intStr + ',' + decStr;
  }

  function formatRuPercent(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    return formatRuNumber(n) + '%';
  }

  function setSizeMetric(el, w, h, empty) {
    var wEl = el.querySelector('[data-part="w"]');
    var hEl = el.querySelector('[data-part="h"]');
    if (empty) {
      wEl.textContent = '—';
      hEl.textContent = '—';
      el.classList.add('muted');
    } else {
      wEl.textContent = formatRuNumber(w);
      hEl.textContent = formatRuNumber(h);
      el.classList.remove('muted');
    }
  }

  function populatePresets(data) {
    presets = data;
    presetSelect.innerHTML = '';
    Object.keys(data).forEach(function (key) {
      var opt = document.createElement('option');
      opt.value = key;
      opt.textContent = data[key].label;
      presetSelect.appendChild(opt);
    });
    syncCustomBlock();
  }

  function syncCustomBlock() {
    var isCustom = presetSelect.value === 'custom';
    customBlock.style.display = isCustom ? '' : 'none';
    if (!isCustom) customInput.value = '';
    updateWindowHeight();
  }

  function updateWindowHeight() {
    var h = HEIGHT_BASE;
    if (presetSelect.value === 'custom') h = HEIGHT_CUSTOM;
    if (errorBox.classList.contains('visible')) {
      h = presetSelect.value === 'custom' ? HEIGHT_CUSTOM + 80 : HEIGHT_ERROR;
    }
    sendResize(h);
  }

  function sendResize(h) {
    parent.postMessage({ pluginMessage: { type: 'resize', width: WINDOW_W, height: h } }, '*');
  }

  function getTargetPercent() {
    var key = presetSelect.value;
    if (!key || !presets[key]) return null;
    if (key === 'custom') {
      var v = parseFloat(customInput.value.replace(',', '.'));
      return (!isNaN(v) && v > 0 && v <= 100) ? v : null;
    }
    return presets[key].percent;
  }

  function updatePercentColor() {
    percentVal.classList.remove('green', 'red');
    if (!state || state.type !== 'ready') return;

    var target = getTargetPercent();
    if (target === null) {
      percentVal.classList.add('green');
      return;
    }

    if (state.info.currentPercent < target) {
      percentVal.classList.add('red');
    } else {
      percentVal.classList.add('green');
    }
  }

  function showError(text) {
    errorBox.textContent = text;
    errorBox.classList.add('visible');
    hideSuccess();
    updateWindowHeight();
  }

  function hideError() {
    errorBox.classList.remove('visible');
    errorBox.textContent = '';
    updateWindowHeight();
  }

  function showSuccess(text) {
    successMsg.textContent = text;
    successMsg.style.display = '';
    hideError();
  }

  function hideSuccess() {
    successMsg.style.display = 'none';
    successMsg.textContent = '';
  }

  function renderState(msg) {
    state = msg;

    if (msg.presets && Object.keys(presets).length === 0) {
      populatePresets(msg.presets);
    }

    if (msg.type === 'no-selection') {
      setSizeMetric(bannerVal, null, null, true);
      setSizeMetric(disclaimerVal, null, null, true);
      percentVal.textContent = '—';
      percentVal.classList.add('muted');
      percentVal.classList.remove('green', 'red');
      applyBtn.disabled = true;
      hideError();
      hideSuccess();
      return;
    }

    if (msg.type === 'invalid') {
      setSizeMetric(bannerVal, null, null, true);
      setSizeMetric(disclaimerVal, null, null, true);
      percentVal.textContent = '—';
      percentVal.classList.add('muted');
      percentVal.classList.remove('green', 'red');
      applyBtn.disabled = true;
      showError(msg.error || 'Неверный выбор');
      return;
    }

    var i = msg.info;
    setSizeMetric(bannerVal, i.bannerWidth, i.bannerHeight, false);
    setSizeMetric(disclaimerVal, i.disclaimerWidth, i.disclaimerHeight, false);
    percentVal.textContent = formatRuPercent(i.currentPercent);
    percentVal.classList.remove('muted');
    updatePercentColor();
    applyBtn.disabled = false;
    hideError();
    hideSuccess();
  }

  presetSelect.addEventListener('change', function () {
    syncCustomBlock();
    updatePercentColor();
    hideError();
    hideSuccess();
  });

  customInput.addEventListener('input', function () {
    updatePercentColor();
    hideError();
    hideSuccess();
  });

  applyBtn.addEventListener('click', function () {
    if (!state || state.type !== 'ready') return;

    var key = presetSelect.value;
    var customPct = null;

    if (key === 'custom') {
      var v = parseFloat(customInput.value.replace(',', '.'));
      if (isNaN(v) || v <= 0 || v > 100) {
        showError('Укажите корректный процент (0–100)');
        return;
      }
      customPct = v;
    }

    applyBtn.disabled = true;
    applyBtn.textContent = 'Применяю…';
    hideError();
    hideSuccess();

    parent.postMessage({ pluginMessage: {
      type: 'apply-resize',
      presetKey: key,
      customPercent: customPct,
      direction: 'height',
      onlyEnlarge: false
    }}, '*');
  });

  window.onmessage = function (evt) {
    var msg = evt.data && evt.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'no-selection' || msg.type === 'invalid' || msg.type === 'ready') {
      applyBtn.textContent = 'Применить';
      if (msg.type === 'ready') applyBtn.disabled = false;
      renderState(msg);
      return;
    }
    if (msg.type === 'success') {
      applyBtn.textContent = 'Применить';
      applyBtn.disabled = false;
      showSuccess(msg.message);
      return;
    }
    if (msg.type === 'error') {
      applyBtn.textContent = 'Применить';
      applyBtn.disabled = false;
      showError(msg.message);
      return;
    }
  };

  parent.postMessage({ pluginMessage: { type: 'request-state' } }, '*');
}());
</script>
</body>
</html>
